name: Deploy Tutorials

on:
  # Run daily at 06:00 UTC
  schedule:
    - cron: '0 6 * * *'
  # Allow manual trigger
  workflow_dispatch:
  # Also trigger on push to main
  push:
    branches: [main]
    paths:
      - 'tutorials/**'
      - 'scripts/**'

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run tutorials collector
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/collect_tutorials.py

      - name: Generate tutorial pages
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'openai' }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'gpt-4o-mini' }}
        run: python3 scripts/generate_tutorials.py

      - name: Commit changes
        run: |
          git config --local user.email "bot@devutils.uk"
          git config --local user.name "DevUtils Bot"
          git add tutorials/ scripts/ _data.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "tutorials: auto-update $(date -u '+%Y-%m-%d %H:%M')"
            git push
          fi

      - name: Cloudflare Pages deployment
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: devtools-site
          directory: '.'
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
