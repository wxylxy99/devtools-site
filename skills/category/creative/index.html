<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative & Media Skills — DevUtils</title>
    <meta name="description" content="Browse creative & media skills for AI agents.">
    <meta property="og:title" content="Creative & Media Skills — DevUtils">
    <meta property="og:url" content="https://devutils.uk/skills/category/creative/">
    <link rel="canonical" href="https://devutils.uk/skills/category/creative/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;510;590;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6731042394462710" crossorigin="anonymous"></script>
    <style>*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;font-feature-settings:'cv01','ss03'}
:root{--bg-marketing:#08090a;--bg-panel:#0f1011;--bg-surface:#191a1b;--bg-elevated:#28282c;--text-primary:#f7f8f8;--text-secondary:#d0d6e0;--text-muted:#8a8f98;--text-quiet:#62666d;--accent:#5e6ad2;--accent-hover:#7170ff;--accent-light:#828fff;--border-subtle:rgba(255,255,255,0.05);--border-standard:rgba(255,255,255,0.08);--border-strong:rgba(255,255,255,0.12);--success:#10b981;--header-bg:rgba(8,9,10,0.92)}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg-marketing);color:var(--text-secondary);min-height:100vh}
.header{position:sticky;top:0;z-index:100;background:var(--header-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--border-subtle);padding:0 24px}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text-primary);font-size:16px;font-weight:510}
.logo-icon{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
.nav{display:flex;align-items:center;gap:4px}
.nav a{text-decoration:none;color:var(--text-muted);font-size:14px;font-weight:510;padding:6px 12px;border-radius:6px;transition:background .15s,color .15s}
.nav a:hover{background:var(--border-subtle);color:var(--text-primary)}
.nav a.active{color:var(--text-primary)}
.breadcrumb{max-width:1200px;margin:0 auto;padding:20px 24px 0;font-size:13px;color:var(--text-quiet)}
.breadcrumb a{color:var(--text-muted);text-decoration:none}
.breadcrumb a:hover{color:var(--text-primary)}
.page-title{max-width:1200px;margin:0 auto;padding:24px 24px 40px}
.page-title h1{font-size:36px;font-weight:510;letter-spacing:-0.8px;color:var(--text-primary);margin-bottom:8px}
.page-title p{font-size:16px;color:var(--text-muted)}
.ad-banner{max-width:1200px;margin:0 auto 40px;padding:0 24px}
.ad-placeholder{background:var(--bg-surface);border:1px solid var(--border-standard);border-radius:8px;height:90px;display:flex;align-items:center;justify-content:center;color:var(--text-quiet);font-size:13px}
.container{max-width:1200px;margin:0 auto;padding:0 24px 80px}
.skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;margin-bottom:40px}
.skill-card{background:var(--bg-surface);border:1px solid var(--border-standard);border-radius:8px;padding:20px;text-decoration:none;color:inherit;display:block;transition:border-color .15s,background .15s}
.skill-card:hover{border-color:var(--accent);background:rgba(94,106,210,0.05)}
.skill-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.skill-name{font-size:15px;font-weight:590;color:var(--text-primary)}
.skill-source{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text-quiet);background:var(--bg-elevated);padding:2px 6px;border-radius:4px}
.skill-desc{font-size:14px;color:var(--text-muted);line-height:1.6;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.skill-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 8px;border-radius:4px;background:var(--bg-elevated);color:var(--text-muted);border:1px solid var(--border-subtle)}
.trust-official{color:var(--success);border-color:rgba(16,185,129,0.3);background:rgba(16,185,129,0.1)}
.trust-builtin{color:var(--accent-light);border-color:rgba(113,112,255,0.3);background:rgba(113,112,255,0.1)}
.empty-state{text-align:center;padding:80px 24px}
.empty-state h3{font-size:20px;font-weight:590;color:var(--text-primary);margin-bottom:12px}
.empty-state p{font-size:15px;margin-bottom:24px}
.empty-state .btn{display:inline-block;padding:10px 20px;background:var(--accent);color:white;border-radius:6px;text-decoration:none;font-size:14px;font-weight:510}
.empty-state .btn:hover{background:var(--accent-hover)}
.footer{border-top:1px solid var(--border-subtle);padding:32px 24px;text-align:center;color:var(--text-quiet);font-size:13px}
.footer a{color:var(--text-muted);text-decoration:none}
.footer a:hover{color:var(--text-primary)}
@media(max-width:640px){.skills-grid{grid-template-columns:1fr}.page-title h1{font-size:28px}}
</style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="https://devutils.uk" class="logo"><div class="logo-icon">{ }</div>DevUtils</a>
            <nav class="nav">
                <a href="https://devutils.uk">Tools</a>
                <a href="https://devutils.uk/blog/">Blog</a>
                <a href="https://devutils.uk/skills/" class="active">Skills</a>
                <a href="https://devutils.uk/about.html">About</a>
            </nav>
        </div>
    </header>
    <div class="breadcrumb"><a href="https://devutils.uk">Home</a> &rsaquo; <a href="https://devutils.uk/skills/">Skills</a> &rsaquo; <span>Creative & Media</span></div>
    <div class="page-title"><h1>Creative & Media</h1><p>Skills for creative & media.</p></div>
    <div class="ad-banner"><div class="ad-placeholder">Advertisement</div></div>
    <div class="container">
        <div class="skills-grid" id="skills-grid"></div>
        <div class="empty-state" id="empty-state" style="display:none;"><h3>Skills Coming Soon</h3><p>This category is being populated. Check back soon.</p><a href="https://devutils.uk/skills/" class="btn">Browse All Skills</a></div>
    </div>
    <footer class="footer"><p><a href="https://devutils.uk">DevUtils</a> &nbsp;|&nbsp; <a href="https://devutils.uk/skills/">Skills</a> &nbsp;|&nbsp; <a href="https://devutils.uk/blog/">Blog</a></p><p style="margin-top:8px;">&copy; 2026 DevUtils.</p></footer>
    <script>
        const skills = window.__SKILLS_DATA__ || [];
        const filtered = skills.filter(s => s.category === 'creative' || (s.tags && s.tags.includes('creative')));
        const grid = document.getElementById('skills-grid');
        const empty = document.getElementById('empty-state');
        if (filtered.length === 0) { grid.style.display = 'none'; empty.style.display = 'block'; }
        else {
            grid.innerHTML = filtered.slice(0,24).map(skill => `<a href="/skills/${skill.id}/" class="skill-card"><div class="skill-header"><div class="skill-name">${skill.name}</div><div style="display:flex;gap:6px;align-items:center;"><span class="skill-source">${skill.source}</span>${skill.trust_level==='official'?'<span class="tag trust-official">official</span>':''}${skill.trust_level==='builtin'?'<span class="tag trust-builtin">builtin</span>':''}</div></div><div class="skill-desc">${skill.description||'No description.'}</div><div class="skill-tags">${(skill.tags||[]).slice(0,4).map(t=>`<span class="tag">${t}</span>`).join('')}</div></a>`).join('');
        }
    </script>
</body>
</html>
